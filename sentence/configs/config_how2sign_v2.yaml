data:
  data_root: "data/how2sign"
  num_frames: 128
  max_train_samples: null
  num_workers: 4
  normalize_pose: true    # shoulder-relative coordinate normalization
  use_velocity: true      # append frame-to-frame delta features (201 -> 402 dim)

model:
  decoder_model: "facebook/mbart-large-cc25"
  tgt_lang: "en_XX"
  keypoint_dim: 402         # 201 keypoints + 201 velocity deltas
  encoder_d_model: 512
  encoder_nhead: 8
  encoder_layers: 6         # deeper than v1 (was 4)
  encoder_ff_dim: 2048
  dropout: 0.1

training:
  epochs: 80
  batch_size: 8
  accumulation_steps: 4     # effective batch = 32
  learning_rate: 1.0e-4     # visual encoder LR
  decoder_lr: 1.0e-4        # mBART decoder LR — increased (was 5e-5)
  weight_decay: 1.0e-4
  warmup_steps: 500         # batch-level optimizer steps (~0.5 epochs on 31K samples)
  max_tgt_len: 128
  num_beams: 4
  bleu_eval_every: 2
  bleu_max_samples: 200
  early_stopping_patience: 8
  checkpoint_dir: "checkpoints/how2sign_v2"
  log_dir: "logs/how2sign_v2"
